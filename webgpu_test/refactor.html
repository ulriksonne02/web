<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebGPU Test</title>
<style>
  @font-face {
      font-family: 'Typo round bold';
      src: url('../fonts/typo-round/Typo_Round_Bold_Italic_Demo.otf') format('opentype'); 
      font-weight: normal;
      font-style: normal;
  }
  body {
    margin: 0; display: flex; flex-direction: column; align-items: center;
    background: #fff; color: #000; font-family: sans-serif;
  }
  h1 { margin: 0.8rem; font-size: 1.4rem; }
  #status {
    margin: 0.3rem; font-size: 0.95rem; min-height: 1.4rem;
    font-family: monospace; color: #9cf;
  }
  #controls {
    margin: 0.6rem; display: flex; gap: 1rem; flex-wrap: wrap;
    align-items: center; font-size: 0.9rem;
  }
  label.btn {
    padding: 0.4rem 0.9rem; background: #266; border-radius: 6px;
    cursor: pointer; user-select: none;
  }
  label.btn:hover { background: #399; }
  input[type="range"] { vertical-align: middle; }
  select, input[type="checkbox"] { accent-color: #6cc; }
  select {
    background: #112; color: #eee; border: 1px solid #444;
    padding: 0.3rem; border-radius: 4px;
  }
  .rounded-bar {
    font-family: 'Typo round bold', Univers LT std, 'ProtoSans35';
    color: #8a9692;
    display: flex;
    height: 80vh;
                    /* stretches to the right edge of its container */
    background: #fede00;
    border:  10px solid #8a9692;
    border-right: 100px;
    margin-left: 10vw;
    margin-top: 5vh;
    margin-bottom: auto;
    
    border-radius: 9999px 0 0 9999px;  /* fully round left, flat right */
    box-sizing: border-box;      /* keeps the border inside the 80vh/100% box */
    
    flex-direction: row;   /* already default, but explicit is clearer */
    align-items: top;
    overflow: hidden;
  }
  .views-grid {
    display: flex;
    /*grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));*/
    gap: 10rem;
    height: 80vh;
    /*max-width: 1200px;*/
    margin-bottom: 1.5rem;
  }
  
  .rounded-bar h1 {
    font-size: 10vh;
    letter-spacing: 3rem;
  }
  
  .rounded-bar h2 {
    font-size: 4vh;
  }

  .page {
    display: block;
    flex: 1 1 auto;
    min-width: 0;          /* crucial: lets flex item shrink with long words/letter-spacing */
    padding: 0 5vw 0 2vw;  /* breathe on the right, small gap from canvas on the left */
    word-break: break-word;
  }

  .views-grid .view-port{
    border: 10px solid #8a9692;
    background: #fede00;
  }
  .view-port {
    position: relative;
    overflow: hidden;
    aspect-ratio: 1 / 1;
  }
  #big-view {
    height: 100%;
    border-radius: 9999px;
    flex: 0 0 auto;
    height: 100%;
    aspect-ratio: 1 / 1;
  }
  .rounded-bar .view-port {

  }
  .view-port canvas {
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
  }
  .view-controls {
    position: absolute;
    top: 12px; left: 12px;
    z-index: 1;
    pointer-events: none;
  }
  .view-controls select {
    pointer-events: auto;
    background: rgba(10,10,24,0.75);
    color: #eee;
    border: 1px solid #666;
    border-radius: 4px;
    padding: 3px 6px;
    font-size: 0.85rem;
  }
  #info {
    margin: 0.4rem; font-size: 0.8rem; color: #888;
    max-width: 620px; text-align: center; line-height: 1.4;
  }
</style>
</head>
<body>
  <!--<h1>WebGPU Multi-Model/View Viewer</h1>
  <div id="status">Initializing…</div>-->
  <div class="view-port" 
        data-model="./models/sphere_random_low.obj"
        data-bg="#e3e6e0"
        data-wire="#8a9692"
        data-fov="30"
        data-distance="2.0"
        data-thickness="2">
      <canvas></canvas>
    </div>
  <div class="rounded-bar">
    <div id="big-view" class="view-port" 
        data-model="./models/sphere.obj"
        data-bg="#fede00"
        data-wire="#8a9692"
        data-fov="65"
        data-distance="2.0"
        data-thickness="5">
      <!--<<div class="view-controls">
        select class="model-select">
          <option value="cube">Cube</option>
          <option value="tetra">Tetra</option>
        </select>
      </div>-->
      <canvas></canvas>
    </div>
    <div class="page">
      <h1>noogen</h1>
      <h2>
        welcome to the future of web design <br>
      </h2>
      <h2>
        this webpage is rendering real-time with pure webgpu, click and drag to rotate, scroll to zoom
      </h2>
    </div>  
  </div>

  



  <!--<p id="info">
    Set <code>data-model</code> on any <code>.view-port</code> to choose its start-up shape
    (<code>cube</code>, <code>tetra</code>, or a path to a .obj file).
    Drag-and-drop a .obj onto a canvas to load it for that view only.
  </p>-->

  <script src="main2.js"></script>
</body>
</html>
